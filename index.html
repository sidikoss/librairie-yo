<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Librairie YO — Livres numériques</title>
    <meta name="description" content="Librairie numérique à Conakry. Achetez et téléchargez vos livres immédiatement via Orange Money." />

    <!-- 1. DNS prefetch + preconnect pour les domaines critiques -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://librairie-yo-default-rtdb.firebaseio.com" />
    <link rel="dns-prefetch" href="https://firebaseinstallations.googleapis.com" />

    <!-- 2. Polices chargées en <link> (non bloquant) au lieu de @import CSS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback pour les navigateurs sans JS -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    </noscript>

    <!-- 3. Style critique inline : évite le flash blanc avant que le bundle charge -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      body{background:#0f0d0b;color:#e8ddd0;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
      #root{min-height:100vh}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
